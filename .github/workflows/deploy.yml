name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
        env:
          # Firebase Cloud Functions backing the AI import helper and
          # cross-browser sync (see functions/README.md). Not secret — just
          # public function addresses; the actual secrets (passcode, API key)
          # live server-side in Firebase Secret Manager, never here.
          VITE_AI_CLEANUP_URL: ${{ vars.VITE_AI_CLEANUP_URL || 'https://us-central1-chris-cooks.cloudfunctions.net/aiCleanup' }}
          VITE_SYNC_URL: ${{ vars.VITE_SYNC_URL || 'https://us-central1-chris-cooks.cloudfunctions.net/syncApi' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
