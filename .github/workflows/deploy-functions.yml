name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: functions
      # Authenticates as the Firebase service account stored in the
      # FIREBASE_SERVICE_ACCOUNT repo secret (Settings > Secrets and
      # variables > Actions) and exports GOOGLE_APPLICATION_CREDENTIALS for
      # the deploy step below, so no key ever needs to be shared by hand.
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: npx firebase-tools@latest deploy --only functions --project chris-cooks --non-interactive
